apiVersion: apps/v1
kind: Deployment
metadata:
  name: seat-service
  namespace: ticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seat-service
  template:
    metadata:
      labels:
        app: seat-service
    spec:
      containers:
        - name: seat-service
          image: 409165006231.dkr.ecr.eu-west-3.amazonaws.com/seat-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: ZEEBE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: camunda-credentials
                  key: zeebeAddress
            - name: ZEEBE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: camunda-credentials
                  key: zeebeClientCloudClientId
            - name: ZEEBE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: camunda-credentials
                  key: zeebeClientCloudClientSecret
            - name: CAMUNDA_OAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: camunda-credentials
                  key: camundaOauthUrl
            - name: ZEEBE_AUTHORIZATION_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: camunda-credentials
                  key: zeebeAuthorizationServerUrl
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 15
