apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
      - name: booking-service
        image: 937792903323.dkr.ecr.eu-west-3.amazonaws.com/booking-service:latest
        ports:
        - containerPort: 8080
        resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        env:
        - name: SPRING_RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: ZEEBE_CLIENT_CLOUD_CLUSTERID
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: zeebeClientCloudClusterId
        - name: ZEEBE_CLIENT_CLOUD_CLIENTID
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: zeebeClientCloudClientId
        - name: ZEEBE_CLIENT_CLOUD_CLIENTSECRET
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: zeebeClientCloudClientSecret
        - name: ZEEBE_CLIENT_CLOUD_REGION
          valueFrom:
            secretKeyRef:
              name: camunda-credentials
              key: zeebeClientCloudRegion
        - name: TICKET_SERVICE_ENDPOINT
          value: "http://ticket-service:3003/ticket"